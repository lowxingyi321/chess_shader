<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chess</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="board-area" aria-label="Chess board">
        <div class="topbar">
          <div>
            <p class="eyebrow">Chess</p>
            <h1 id="status">White to move</h1>
          </div>
          <div class="actions" aria-label="Game controls">
            <button id="flip-board" type="button" title="Flip board" aria-label="Flip board">↕</button>
            <button id="undo-move" type="button" title="Undo move" aria-label="Undo move">↶</button>
            <button id="reset-game" type="button" title="New game" aria-label="New game">＋</button>
          </div>
        </div>

        <div class="board-wrap">
          <div class="files files-top" aria-hidden="true"></div>
          <div class="board-grid">
            <div class="ranks ranks-left" aria-hidden="true"></div>
            <div id="board" class="board" role="grid" aria-label="Chess board"></div>
            <div class="ranks ranks-right" aria-hidden="true"></div>
          </div>
          <div class="files files-bottom" aria-hidden="true"></div>
        </div>
      </section>

      <aside class="side-panel" aria-label="Game details">
        <section class="panel-section">
          <div class="panel-heading">
            <h2>Opponent</h2>
            <span id="engine-state" class="engine-state">Human</span>
          </div>
          <div class="opponent-controls" role="group" aria-label="Opponent mode">
            <button class="opponent-option active" type="button" data-game-mode="human">Human</button>
            <button class="opponent-option" type="button" data-game-mode="stockfish">Stockfish</button>
          </div>
          <div id="engine-options" class="engine-options" hidden>
            <div class="side-controls" role="group" aria-label="Human side">
              <button class="side-option active" type="button" data-human-color="w">White</button>
              <button class="side-option" type="button" data-human-color="b">Black</button>
            </div>
            <label class="level-control" for="stockfish-level">
              <span>Level <strong id="stockfish-level-value">8</strong></span>
              <input id="stockfish-level" type="range" min="1" max="20" value="8" />
            </label>
          </div>
        </section>

        <section class="panel-section">
          <div class="panel-heading">
            <h2>Shaders</h2>
          </div>
          <div class="shader-controls" role="group" aria-label="Attack shader visibility">
            <button class="shader-option active" type="button" data-shader-mode="both">Both</button>
            <button class="shader-option" type="button" data-shader-mode="w">White</button>
            <button class="shader-option" type="button" data-shader-mode="b">Black</button>
          </div>
          <div class="shader-legend" aria-label="Attack shader colors">
            <span><i class="legend-red"></i>Against you</span>
            <span><i class="legend-blue"></i>By you</span>
          </div>
        </section>

        <section class="panel-section">
          <div class="panel-heading">
            <h2>PGN</h2>
            <span id="pgn-state" class="pgn-state">Ready</span>
          </div>
          <textarea
            id="pgn-input"
            class="pgn-input"
            rows="6"
            spellcheck="false"
            placeholder="Paste PGN here"
          ></textarea>
          <div class="pgn-actions">
            <button id="import-pgn" type="button">Import</button>
            <label for="pgn-file">File</label>
            <input id="pgn-file" type="file" accept=".pgn,text/plain" />
          </div>
        </section>

        <section class="panel-section">
          <div class="panel-heading">
            <h2>Captured</h2>
          </div>
          <div class="captures">
            <div>
              <span>White</span>
              <p id="captured-white"></p>
            </div>
            <div>
              <span>Black</span>
              <p id="captured-black"></p>
            </div>
          </div>
        </section>

        <section class="panel-section moves-section">
          <div class="panel-heading">
            <h2>Moves</h2>
            <span id="move-count">0</span>
          </div>
          <div class="playback-controls" aria-label="Move playback controls">
            <button id="move-back" type="button" title="Previous move" aria-label="Previous move">‹</button>
            <button id="move-play" type="button" title="Play moves" aria-label="Play moves">▶</button>
            <button id="move-next" type="button" title="Next move" aria-label="Next move">›</button>
          </div>
          <ol id="move-list" class="move-list" aria-label="Move history"></ol>
        </section>
      </aside>
    </main>
  </body>
</html>
